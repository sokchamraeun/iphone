<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <title>Menu</title>
</head>
<body>
 <!-- Product Section -->
<section class="py-12 bg-gray-100">
    <div class="max-w-7xl mx-auto px-4">

        <h2 class="text-3xl font-bold text-center mb-10">Our Products</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

            <div class="bg-white rounded-xl shadow-md p-4 relative hover:shadow-xl transition">
                <img class="w-full h-100 md:h-53 object-cover rounded-lg sm:min-w-10" src="./images/image.png" alt="">
                <h3 class="mt-4 text-lg font-bold">iPhone 17 Pro Max</h3>
                <p class="mt-2 text-gray-600">$2000</p>
                <button class="absolute bottom-4 right-4 px-4 py-2 bg-yellow-400 rounded-lg hover:bg-yellow-500 transition">
                    Buy
                </button>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-xl shadow-md p-4 relative hover:shadow-xl transition">
                <img class="w-full h-100 md:h-53 h-52 object-cover rounded-lg" src="./images/image.png" alt="">
                <h3 class="mt-4 text-lg font-bold">Samsung Galaxy S25</h3>
                <p class="mt-2 text-gray-600">$1800</p>
                <button class="absolute bottom-4 right-4 px-4 py-2 bg-yellow-400 rounded-lg hover:bg-yellow-500 transition">
                    Buy
                </button>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-xl shadow-md p-4 relative hover:shadow-xl transition">
                <img class="w-full h-100 md:h-53 object-cover rounded-lg" src="./images/image.png" alt="">
                <h3 class="mt-4 text-lg font-bold">Google Pixel 9</h3>
                <p class="mt-2 text-gray-600">$1500</p>
                <button class="absolute bottom-4 right-4 px-4 py-2 bg-yellow-400 rounded-lg hover:bg-yellow-500 transition">
                    Buy
                </button>
            </div>

            <!-- Product Card -->
            <div class="bg-white rounded-xl shadow-md p-4 relative hover:shadow-xl transition">
                <img class="w-full h-100 md:h-53 object-cover rounded-lg" src="./images/image.png" alt="">
                <h3 class="mt-4 text-lg font-bold">Xiaomi 15 Ultra</h3>
                <p class="mt-2 text-gray-600">$1200</p>
                <button class="absolute bottom-4 right-4 px-4 py-2 bg-yellow-400 rounded-lg hover:bg-yellow-500 transition">
                    Buy
                </button>
            </div>

        </div>
    </div>
</section>
  
 
</body>
</html>
