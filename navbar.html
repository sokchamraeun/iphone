<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

</head>
<style>
    body{
        background-color: rgb(255, 251, 251);
    }
</style>
<body>
    <nav class="flex justify-between items-center m-10 ">
        <div class="logo">
            <img class="w-15 sm:w-20" src="./images/logo.png" alt="">
        </div>
        <div class="menu">
            <ul class="flex  sm:gap-5 md:gap-10">
                <li class="font-bold text-lg hidden sm:block text-teal-300 hover:text-black transition duration-250">Home</li>
                <li class="font-bold text-lg hidden sm:block text-teal-300 hover:text-black transition duration-250">About</li>
                <li class="font-bold text-lg hidden sm:block text-teal-300 hover:text-black transition duration-250">Service</li>
            </ul>
        </div>
        <div class="flex gap-5 items-center text-teal-300 text-lg">
            <div class="block sm:hidden"><i class="fa-solid fa-bars"></i></div>
            <div class="login font-bold text-sm sm:text-lg text-teal-300">Login</div>
        </div>

    </nav>
</body>
</html>
