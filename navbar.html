<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

</head>
<style>
    body{
        background-color: rgb(255, 251, 251);
    }
</style>
<body>
<!-- Navbar -->
<nav class="bg-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      
      <!-- Logo -->
      <div class="flex items-center">
        <span class="text-2xl font-bold text-blue-600">MyLogo</span>
      </div>

      <!-- Menu (Desktop) -->
      <div class="hidden md:flex space-x-8 items-center">
        <a href="#" class="text-gray-700 hover:text-blue-600">Home</a>
        <a href="#" class="text-gray-700 hover:text-blue-600">About</a>
        <a href="#" class="text-gray-700 hover:text-blue-600">Service</a>
        <a href="#" class="text-gray-700 hover:text-blue-600">Contact</a>
        <a href="#" class="text-gray-700 hover:text-blue-600">Location</a>
      </div>

      <!-- Auth Buttons -->
      <div class="hidden md:flex space-x-4">
        <a href="#" class="px-4 py-2 text-blue-600 border border-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition">
          Login
        </a>
        <a href="#" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
          Register
        </a>
      </div>

      <!-- Mobile Button -->
      <div class="md:hidden">
        <button id="menu-btn" class="text-gray-700 focus:outline-none">
          ☰
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 space-y-2">
    <a href="#" class="block text-gray-700 hover:text-blue-600">Home</a>
    <a href="#" class="block text-gray-700 hover:text-blue-600">About</a>
    <a href="#" class="block text-gray-700 hover:text-blue-600">Service</a>
    <a href="#" class="block text-gray-700 hover:text-blue-600">Contact</a>
    <a href="#" class="block text-gray-700 hover:text-blue-600">Location</a>
    <a href="#" class="block text-blue-600">Login</a>
    <a href="#" class="block text-white bg-blue-600 px-3 py-2 rounded-lg">Register</a>
  </div>
</nav>

<!-- Toggle Script -->
<script>
  const btn = document.getElementById('menu-btn');
  const menu = document.getElementById('mobile-menu');

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });
</script>
</body>
</html>
