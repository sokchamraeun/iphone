<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <title>hero-section</title>
</head>
<body>
    <section class="bg-gray-100 py-16">
  <div class="container mx-auto px-6 md:flex items-center justify-between">
    
    <!-- Left Content -->
    <div class="md:w-1/2">
      <h1 class="text-4xl md:text-5xl font-bold text-gray-800 leading-tight">
        Premium Wireless Headphones
      </h1>
      
      <p class="mt-4 text-gray-600 text-lg">
        Experience crystal clear sound and deep bass with our newest model.
        Designed for comfort and performance.
      </p>

      <div class="mt-6 flex gap-4">
        <button class="bg-black text-white px-6 py-3 rounded-lg 
                       hover:bg-gray-800 transition duration-300">
          Buy Now
        </button>

        <button class="border border-black px-6 py-3 rounded-lg 
                       hover:bg-black hover:text-white transition duration-300">
          Learn More
        </button>
      </div>
    </div>

    <!-- Right Image -->
    <div class="md:w-1/2 mt-10 md:mt-0 flex justify-center">
      <img src="./images/image.png"
           class="rounded-xl shadow-lg hover:scale-105 transition duration-500"
           alt="Product Image">
    </div>

  </div>
</section>
</body>
</html>
